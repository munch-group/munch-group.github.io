<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">Munch Group</a>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      {% for my_page in site.pages %}
        {% if my_page.menu == 'main' %}
          <a href="{{ my_page.url | relative_url }}"{% if page.url == my_page.url %} class="active"{% endif %}>{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
