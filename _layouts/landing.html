<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>
    {% include nav.html %}
    <section class="hero" {% if page.banner %}style="background-image: url('{{ page.banner | relative_url }}')"{% endif %}>
      <div class="hero-overlay">
        <h1>{{ site.title }}</h1>
        <p>{{ site.description | markdownify }}</p>
      </div>
    </section>
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
  </body>
</html>
